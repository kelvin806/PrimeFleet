<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Log In</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    
     
     <div class="page-wrap">
        <div class="logo">
            <img src="Assets/Logo 2.png" alt="">
        </div>
    
    <div class="form-container">
      <form class="booking-form" novalidate>
        <h2 class="section-title">Admin Login</h2>
      <p class="section-title-p">Login to manage bookings, vehicles and payments.</p>
        <div class="field">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="youremail@gmail.com"/>
        </div>
        <div class="field">
          <label for="password">Password</label>
         <input type="password" id="password" placeholder="Enter your password">
          
        </div>

        <div class="remember">
                <div class="inner">
                <input type="checkbox" >
                <p>Remember me</p>
                </div>

                <div class="inner2">
                    <p>Forget password?</p>
                </div>
            </div>
    
        <div class="proceed-wrap">
          <button type="submit" class="btn-proceed">Login</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>

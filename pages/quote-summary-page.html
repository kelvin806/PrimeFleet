<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeFleet</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    

    <div class="Quote-img">
        <img src="/images/Frame 338.png" alt="Quote summary">
    </div>

    <section>
        <div class="myh1">
            <h1>Trip Summary</h1>
        </div>

        <div class="summary-container">
            <div>
                <img src="/images/Frame 380.png" alt="Distance-img">
            </div>
            <div class="from-container">
                <div class="from">
                    <label for="text">From:</label>
                    <input type="text" id="From" placeholder="Lagos Airport">
                </div>
                <div class="from">
                    <label for="text">To:</label>
                    <input type="text" id="From" placeholder="Ikoyi">
                </div>
                <div class="from">
                    <label for="text">Distance Cost:</label>
                    <input type="text" id="From" placeholder="₦30,000">
                </div>
            </div>
        </div>

        </div>

        <div class="vehicle-smry">
            <h1>Vehicle Summary</h1>

            <div class="base-input-container">
                <div>
                    <input type="number" class="base-input" min="0" placeholder="Base Fare:">
                </div>

                <div>
                    <input type="number" class="base-input" min="0" placeholder="Total Number Of Vehicles:">
                </div>

            </div>

            <div class="vehicle-cost-container">
                <label for="number">Vehicle Cost:</label>
                <input type="number" min="0" class="vehicle-cost">
            </div>

        </div>

        <div class="total-payment-container">
            <input type="text"  class="total-payment" placeholder="Total Payment:">
        </div>

        <div class="Proceed-btn-container">
            <button class="Proceed-btn">Proceed</button>
        </div>
    </section>
</body>

</html>

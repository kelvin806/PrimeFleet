<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFleet Payments Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
:root { --navy:#0A2D51; --border:#eeeeee; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#fff;display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#fff;border-bottom:1px solid var(--border);height:70px;position:sticky;top:0;z-index:1000}
.logo-section img{height:35px}
.header-center{display:flex;align-items:center;gap:20px;flex:1;justify-content:center;padding:0 15px}
.search-container{position:relative;width:100%;max-width:400px}
.search-container i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#999}
.search-bar{width:100%;padding:8px 12px 8px 35px;border:1px solid #ddd;border-radius:20px;outline:none}
.layout{display:flex;flex:1}
.sidebar{width:220px;background-color:var(--navy);color:#fff}
.sidebar-item{padding:15px 20px;display:flex;align-items:center;gap:12px;color:#cbd5e0;text-decoration:none;font-size:14px}
.sidebar-item.active{background:white;color:var(--navy);font-weight:bold}
.content{flex:1;padding:20px;background:#fcfcfc}
.summary-banner{background:var(--navy);border-radius:10px;padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}
.summary-card{background:white;border-radius:10px;padding:15px;text-align:center}
.summary-title{font-size:12px;color:#666}
.summary-amount{font-weight:bold;font-size:18px}
.table-container{background:white;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05);overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th,td{padding:12px;font-size:13px;border-bottom:1px solid var(--border);text-align:center}
.status-pending{color:#f59e0b;font-weight:600}
.status-fully-paid{color:#10b981;font-weight:600}
.status-confirmed{color:#2563eb;font-weight:600}
button.verify-btn{border:none;background:none;color:#2563eb;cursor:pointer}
@media(max-width:1024px){
.sidebar{width:70px}
.sidebar-item span{display:none}
.sidebar-item i{font-size:20px;margin:auto}
}
@media(max-width:768px){
.layout{flex-direction:column}
.sidebar{width:100%;display:flex;justify-content:space-around}
.summary-banner{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="header">
<div class="logo-section"><img src="Logo.png" alt="Logo"></div>
<div class="header-center">
<div class="search-container">
<i class="fas fa-search"></i>
<input type="text" class="search-bar" placeholder="Search by client or booking ID">
</div>
</div>
</header>

<div class="layout">
<nav class="sidebar">
<a href="#" class="sidebar-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
<a href="#" class="sidebar-item"><i class="fas fa-calendar-check"></i><span>Bookings</span></a>
<a href="#" class="sidebar-item"><i class="fas fa-user-tie"></i><span>Drivers</span></a>
<a href="#" class="sidebar-item active"><i class="fas fa-wallet"></i><span>Payment</span></a>
</nav>

<main class="content">
<div class="summary-banner">
<div class="summary-card"><div class="summary-title">Expected Amount</div><div id="expected" class="summary-amount">#0</div></div>
<div class="summary-card"><div class="summary-title">Received</div><div id="received" class="summary-amount">#0</div></div>
<div class="summary-card"><div class="summary-title">Outstanding Balance</div><div id="balance" class="summary-amount">#0</div></div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Booking ID</th>
<th>Client</th>
<th>Service</th>
<th>Amount</th>
<th>Deposit</th>
<th>Balance</th>
<th>Pay Mode</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</main>
</div>

<script>
const API = { PENDING:"https://primefleet-mvp.onrender.com/api/v1/payments/pending" };
const tbody = document.getElementById("tbody");
const expectedEl = document.getElementById("expected");
const receivedEl = document.getElementById("received");
const balanceEl = document.getElementById("balance");
const searchInput = document.querySelector(".search-bar");

const state = { bookings: [], search: "" };

// Generate fallback sample payments (civil payments)
function generateSamplePayments(count=5){
    const clients=["Ubong Eze","Jane Smith","Acme Corp","Globex Ltd","Alice Johnson"];
    const services=["Event","Airport","Executive","Airport","Executive"];
    const statuses=["Pending","Fully Paid","Confirmed"];
    const payModes=["Card","Bank Transfer","Cash"];
    const samples=[];
    for(let i=0;i<count;i++){
        const amount=Math.floor(Math.random()*100000)+10000;
        const deposit=Math.floor(Math.random()*amount);
        samples.push({
            id:`PF-${20237+i}`,
            client:clients[i%clients.length],
            service:services[i%services.length],
            amount:amount,
            deposit:deposit,
            balance:amount-deposit,
            payMode:payModes[i%payModes.length],
            date:new Date(Date.now()-Math.random()*10*24*60*60*1000).toISOString().split("T")[0],
            status:statuses[i%statuses.length]
        });
    }
    return samples;
}

// Fetch API + fallback logic
async function fetchPayments(){
    // Add sample payments first (visible immediately if API fails)
    const samples = generateSamplePayments(5);
    state.bookings = [...samples];
    renderTable(state.bookings);

    try{
        const res = await fetch(API.PENDING);
        const data = await res.json();
        const apiPayments = data.data || data || [];
        if(apiPayments.length>0){
            // If API returns payments, replace table with API payments only
            state.bookings = apiPayments;
            renderTable(state.bookings);
        }
    } catch(e){
        console.warn("API failed, showing civil payments only", e);
    }
}

// Render table + summary
function renderTable(data){
    const filtered = data.filter(item=>item.client.toLowerCase().includes(state.search)||item.id.toLowerCase().includes(state.search));
    if(!filtered.length){ tbody.innerHTML="<tr><td colspan='10'>No data found</td></tr>"; return; }

    let expected=0, received=0, balance=0;
    tbody.innerHTML="";
    filtered.forEach(item=>{
        expected+=item.amount; received+=item.deposit; balance+=item.balance;
        const status=item.status.toLowerCase().replace(" ","-");
        tbody.innerHTML+=`<tr>
            <td>${item.id}</td>
            <td>${item.client}</td>
            <td>${item.service}</td>
            <td>#${item.amount.toLocaleString()}</td>
            <td>#${item.deposit.toLocaleString()}</td>
            <td>#${item.balance.toLocaleString()}</td>
            <td>${item.payMode || '-'}</td>
            <td>${item.date || '-'}</td>
            <td class="status-${status}">${item.status}</td>
            <td>${status==="pending"?'<button class="verify-btn" onclick="alert(\'Verified!\')">Verify</button>':'-'}</td>
        </tr>`;
    });

    expectedEl.textContent="#"+expected.toLocaleString();
    receivedEl.textContent="#"+received.toLocaleString();
    balanceEl.textContent="#"+balance.toLocaleString();
}

// Search filter
searchInput.addEventListener("input",(e)=>{
    state.search=e.target.value.toLowerCase();
    renderTable(state.bookings);
});

// Initialize
fetchPayments();
</script>

</body>
</html>
